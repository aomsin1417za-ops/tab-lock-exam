  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // FadeIn Animation Wrapper
    const FadeIn = ({ children, delay = 0, duration = 0.7, x = 0, y = 30, as = 'div', className = '' }) => {
      const Component = motion[as] || motion.div;
      return (
        <Component
          initial={{ opacity: 0, x, y }}
          whileInView={{ opacity: 1, x: 0, y: 0 }}
          viewport={{ once: true, margin: '50px', amount: 0 }}
          transition={{
            delay,
            duration,
            ease: [0.25, 0.1, 0.25, 1],
          }}
          className={className}
        >
          {children}
        </Component>
      );
    };

    // Magnet mouse-following hover effect
    const Magnet = ({ children, padding = 150, strength = 3, activeTransition = 'transform 0.3s ease-out', inactiveTransition = 'transform 0.6s ease-in-out', className = '' }) => {
      const [position, setPosition] = useState({ x: 0, y: 0 });
      const [isActive, setIsActive] = useState(false);
      const elementRef = useRef(null);

      useEffect(() => {
        const handleMouseMove = (e) => {
          if (!elementRef.current) return;
          const rect = elementRef.current.getBoundingClientRect();
          const centerX = rect.left + rect.width / 2;
          const centerY = rect.top + rect.height / 2;

          const distanceX = e.clientX - centerX;
          const distanceY = e.clientY - centerY;

          const isInside =
            e.clientX >= rect.left - padding &&
            e.clientX <= rect.right + padding &&
            e.clientY >= rect.top - padding &&
            e.clientY <= rect.bottom + padding;

          if (isInside) {
            setIsActive(true);
            setPosition({
              x: distanceX / strength,
              y: distanceY / strength,
            });
          } else {
            setIsActive(false);
            setPosition({ x: 0, y: 0 });
          }
        };

        const handleMouseLeave = () => {
          setIsActive(false);
          setPosition({ x: 0, y: 0 });
        };

        window.addEventListener('mousemove', handleMouseMove);
        window.addEventListener('mouseleave', handleMouseLeave);
        return () => {
          window.removeEventListener('mousemove', handleMouseMove);
          window.removeEventListener('mouseleave', handleMouseLeave);
        };
      }, [padding, strength]);

      return (
        <div
          ref={elementRef}
          className={`relative inline-block ${className}`}
          style={{
            transform: `translate3d(${position.x}px, ${position.y}px, 0)`,
            transition: isActive ? activeTransition : inactiveTransition,
            willChange: 'transform',
          }}
        >
          {children}
        </div>
      );
    };

    // Character character scroll text reveal component
    const Character = ({ char, index, total, progress }) => {
      if (!progress) return <span className="inline-block">{char === ' ' ? '\u00A0' : char}</span>;
      
      const start = index / total;
      const end = Math.min(1, (index + 8) / total);
      const opacity = useTransform(progress, [start, end], [0.2, 1]);

      if (char === ' ') {
        return <span className="inline-block">&nbsp;</span>;
      }

      return (
        <span className="relative inline-block">
          <span className="opacity-0">{char}</span>
          <motion.span style={{ opacity }} className="absolute inset-0 select-none">
            {char}
          </motion.span>
        </span>
      );
    };

    const AnimatedText = ({ text, className = '', style }) => {
      const containerRef = useRef(null);
      let scrollYProgress = null;

      try {
        const { scrollYProgress: sp } = useScroll({
          target: containerRef,
          offset: ['start 0.8', 'end 0.2'],
        });
        scrollYProgress = sp;
      } catch (e) {
        // Safe fallback in case hooks fail
      }

      const chars = text.split('');
      const total = chars.length;

      return (
        <p ref={containerRef} className={`flex flex-wrap ${className}`} style={style}>
          {chars.map((char, index) => (
            <Character
              key={index}
              char={char}
              index={index}
              total={total}
              progress={scrollYProgress}
            />
          ))}
        </p>

    };

    // --- SECTION 2: MARQUEE SECTION ---
    const row1Images = [
      'images/student_exam_ui.jpg',
      'images/student_studying.jpg',
      'images/student_cartoon.jpg',
      'images/teacher_cartoon.jpg',
      'images/teacher_class.jpg',
      'images/teacher_analytics.jpg',
    ];

    const row2Images = [
      'images/admin_cartoon.jpg',
      'images/admin_security.jpg',
      'images/admin_database.jpg',
      'images/exam_security_ui.jpg',
      'images/classroom_stats_ui.jpg',
      'images/ai_question_generation_ui.jpg',
    ];

    const MarqueeSection = () => {
      const sectionRef = useRef(null);
      const [scrollOffset, setScrollOffset] = useState(0);

      useEffect(() => {
        const handleScroll = () => {
          if (!sectionRef.current) return;
          const rect = sectionRef.current.getBoundingClientRect();
          const sectionTop = rect.top + window.scrollY;
          const offset = (window.scrollY - sectionTop + window.innerHeight) * 0.3;
          setScrollOffset(offset);
        };

        window.addEventListener('scroll', handleScroll, { passive: true });
        handleScroll();

        return () => {
          window.removeEventListener('scroll', handleScroll);
        };
      }, []);

      const tripledRow1 = [...row1Images, ...row1Images, ...row1Images];
      const tripledRow2 = [...row2Images, ...row2Images, ...row2Images];

      return (
        <section
          ref={sectionRef}
          className="w-full bg-[#0C0C0C] pt-24 sm:pt-32 md:pt-40 pb-10 overflow-hidden flex flex-col gap-3"
        >

            <div

                transform: `translateX(${scrollOffset - 2000}px)`,

    };

              className="text-[#D7E2EA] font-medium leading-relaxed max-w-[560px] text-center justify-center"

            <div className="h-16 sm:h-20 md:h-24" />

            <FadeIn delay={0.1} y={20}>

    };


    // --- SECTION 4: SERVICES SECTION ---
    const servicesData = [
      {
        num: '01',

                    >
                      {service.num}
                    </div>

                    <div className="flex flex-col gap-2 md:gap-3 flex-1">
                      <h3
                        className="font-medium uppercase text-[#0C0C0C]"
                        style={{ fontSize: 'clamp(1rem, 2.2vw, 2.1rem)' }}
                      >
                        {service.name}
                      </h3>
                      <p
                        className="font-light leading-relaxed text-[#0C0C0C] opacity-60 max-w-2xl"
                        style={{ fontSize: 'clamp(0.85rem, 1.6vw, 1.25rem)' }}
                      >
                        {service.desc}
                      </p>
                    </div>
                  </div>
                </FadeIn>
              ))}
            </div>
          </div>
        </section>
      );
    };


    // --- SECTION 5: PROJECTS SECTION ---
    const projectsData = [
      {
        num: '01',
        category: 'Exam Environment',
        name: 'Student Exam Portal',
        link: 'Student-login.html',
        col1Img1: 'images/student_exam_ui.jpg',
        col1Img2: 'images/student_studying.jpg',
        col2Img: 'images/student_cartoon.jpg',
      },
      {
        num: '02',
        category: 'Management & Monitoring',
        name: 'Teacher Dashboard',
        link: 'teacher-login.html',
        col1Img1: 'images/teacher_analytics.jpg',
        col1Img2: 'images/teacher_class.jpg',
        col2Img: 'images/teacher_cartoon.jpg',
      },
      {
        num: '03',
        category: 'Global System Controls',
        name: 'Super Admin Panel',
        link: 'admin-login.html',
        col1Img1: 'images/admin_database.jpg',
        col1Img2: 'images/admin_security.jpg',
        col2Img: 'images/admin_cartoon.jpg',
      },
    ];

    const StackingCard = ({ project, index, totalCards }) => {
      const containerRef = useRef(null);
      const targetScale = 1 - (totalCards - 1 - index) * 0.03;
      const topOffset = index * 28;
      let scale = 1;

      try {
        const { scrollYProgress } = useScroll({
          target: containerRef,
          offset: ['start start', 'end start'],
        });
        scale = useTransform(scrollYProgress, [0, 1], [1, targetScale]);
      } catch (e) {
        // Fallback
      }

      return (
        <div
          ref={containerRef}
          className="sticky w-full h-[85vh] flex items-start justify-center"
          style={{
            top: `calc(6rem + ${topOffset}px)`,
          }}
        >
          <motion.div
            style={{ scale }}
            className="w-full bg-[#0C0C0C] border-2 border-[#D7E2EA] rounded-[40px] sm:rounded-[50px] md:rounded-[60px] p-4 sm:p-6 md:p-8 flex flex-col gap-6 sm:gap-8 md:gap-10 shadow-2xl"
          >
            {/* Top Row */}
            <div className="flex justify-between items-center w-full">
              <div className="flex items-center gap-4 sm:gap-6">
                <span
                  className="font-black text-[#D7E2EA] leading-none"
                  style={{ fontSize: 'clamp(2rem, 6vw, 90px)' }}
                >
                  {project.num}
                </span>
                <div className="flex flex-col text-left">
                  <span className="text-xs sm:text-sm uppercase tracking-wider text-[#D7E2EA] opacity-60">
                    {project.category}
                  </span>
                  <span className="text-sm sm:text-lg md:text-xl font-bold text-[#D7E2EA] uppercase tracking-wide">
                    {project.name}
                  </span>
                </div>
              </div>

              <LiveProjectButton onClick={() => window.location.href = project.link} label="เข้าสู่ระบบ" />
            </div>

            {/* Bottom Row - Columns Image Grid */}
            <div className="grid grid-cols-10 gap-3 sm:gap-4 md:gap-5 w-full flex-1 min-h-0 overflow-hidden">
              <div className="col-span-4 flex flex-col gap-3 sm:gap-4 h-full justify-between">
                <img
                  src={project.col1Img1}
                  alt={`${project.name} image 1`}
                  className="w-full object-cover rounded-[20px] sm:rounded-[35px] md:rounded-[45px] lg:rounded-[60px] select-none pointer-events-none flex-1 min-h-0"
                  style={{ height: 'clamp(130px, 16vw, 230px)' }}
                />
                <img
                  src={project.col1Img2}
                  alt={`${project.name} image 2`}
                  className="w-full object-cover rounded-[20px] sm:rounded-[35px] md:rounded-[45px] lg:rounded-[60px] select-none pointer-events-none flex-1 min-h-0"
                  style={{ height: 'clamp(160px, 22vw, 340px)' }}
                />
              </div>

              <div className="col-span-6 h-full">
                <img
                  src={project.col2Img}
                  alt={`${project.name} image 3`}
                  className="w-full h-full object-cover rounded-[20px] sm:rounded-[35px] md:rounded-[45px] lg:rounded-[60px] select-none pointer-events-none"
                />
              </div>
            </div>
          </motion.div>
        </div>
      );
    };

    const ProjectsSection = () => {
      const sectionRef = useRef(null);
      let scrollYProgress = null;

      try {
        const { scrollYProgress: sp } = useScroll({
          target: sectionRef,
          offset: ['start start', 'end end'],
        });
        scrollYProgress = sp;
      } catch (e) {
        // Fallback
      }

      const totalCards = projectsData.length;

      return (
        <section
          ref={sectionRef}
          id="projects"
          className="bg-[#0C0C0C] rounded-t-[40px] sm:rounded-t-[50px] md:rounded-t-[60px] -mt-10 sm:-mt-12 md:-mt-14 pt-20 pb-20 relative z-10 px-5 sm:px-8 md:px-10 flex flex-col items-center"
        >
          <div className="max-w-5xl w-full flex flex-col gap-16 md:gap-20">
            <FadeIn delay={0} y={40} className="w-full text-center">
              <h2
                className="hero-heading font-black uppercase text-center leading-none tracking-tight"
                style={{ fontSize: 'clamp(3rem, 12vw, 160px)' }}
              >
                Portals
              </h2>
            </FadeIn>

            <div className="flex flex-col gap-24 sm:gap-32 w-full relative">
              {projectsData.map((project, index) => (
                <StackingCard
                  key={project.num}
                  project={project}
                  index={index}
                  totalCards={totalCards}
                />
              ))}
            </div>
          </div>
        </section>
      );
    };


    // --- FLOATING PORTAL OVERLAY MODAL ---
    const FloatingPortal = ({ isOpen, setIsOpen }) => {
      return (
        <React.Fragment>
          {/* Floating trigger button */}
          <button
            onClick={() => setIsOpen(true)}
            className="portal-float-btn px-5 py-3 rounded-full text-xs font-bold text-white uppercase tracking-wider flex items-center gap-2 select-none"
          >
            🔒 ระบบสอบ Tab-Lock
          </button>

          {/* Modal overlay */}
          <AnimatePresence>
            {isOpen && (
              <motion.div
                initial={{ opacity: 0 }}
                animate={{ opacity: 1 }}
                exit={{ opacity: 0 }}
                className="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-[99999] flex items-center justify-center p-4"
                onClick={() => setIsOpen(false)}
              >
                <motion.div
                  initial={{ scale: 0.9, y: 20 }}
                  animate={{ scale: 1, y: 0 }}
                  exit={{ scale: 0.9, y: 20 }}
                  transition={{ type: 'spring', damping: 25, stiffness: 350 }}
                  className="bg-white rounded-3xl p-8 md:p-10 max-w-2xl w-full shadow-2xl space-y-6 text-[#0C0C0C]"
                  onClick={(e) => e.stopPropagation()}
                >
                  <div className="flex justify-between items-start">
                    <div className="space-y-1">
                      <h3 className="text-2xl font-black text-slate-800 uppercase tracking-wide">เข้าสู่ระบบสอบออนไลน์</h3>
                      <p className="text-sm text-slate-500 font-medium">กรุณาเลือกประเภทการใช้งานเพื่อเข้าสู่ระบบสอบ Tab-Lock</p>
                    </div>
                    <button
                      onClick={() => setIsOpen(false)}
                      className="text-slate-400 hover:text-slate-700 text-2xl font-bold p-1 hover:bg-slate-100 rounded-lg transition"
                    >
                      ✕
                    </button>
                  </div>

                  <div className="flex flex-col gap-4">
                    <a
                      href="Student-login.html"
                      className="flex items-center justify-between p-4 rounded-2xl bg-cyan-50 hover:bg-cyan-100 border border-cyan-200 transition-all font-bold group"
                    >
                      <div className="flex items-center gap-4">
                        <img
                          src="images/student_cartoon.jpg"
                          alt="Student 3D"
                          className="w-16 h-16 rounded-2xl object-cover border border-cyan-150 shadow-sm"
                        />
                        <div className="flex flex-col text-left">
                          <span className="text-base sm:text-lg text-cyan-800 leading-tight">เข้าสู่ระบบนักศึกษา</span>
                          <span className="text-xs sm:text-sm text-cyan-600 font-light">สำหรับเข้าทำข้อสอบ</span>
                        </div>
                      </div>
                      <span className="text-cyan-400 group-hover:translate-x-1.5 transition-transform text-lg">➔</span>
                    </a>

                    <a
                      href="teacher-login.html"
                      className="flex items-center justify-between p-4 rounded-2xl bg-violet-50 hover:bg-violet-100 border border-violet-200 transition-all font-bold group"
                    >
                      <div className="flex items-center gap-4">
                        <img
                          src="images/teacher_cartoon.jpg"
                          alt="Teacher 3D"
                          className="w-16 h-16 rounded-2xl object-cover border border-violet-150 shadow-sm"
                        />
                        <div className="flex flex-col text-left">
                          <span className="text-base sm:text-lg text-violet-800 leading-tight">เข้าสู่ระบบอาจารย์</span>
                          <span className="text-xs sm:text-sm text-violet-600 font-light">สำหรับสร้างข้อสอบและดูรายงาน</span>
                        </div>
                      </div>
                      <span className="text-violet-400 group-hover:translate-x-1.5 transition-transform text-lg">➔</span>
                    </a>

                    <a
                      href="admin-login.html"
                      className="flex items-center justify-between p-4 rounded-2xl bg-rose-50 hover:bg-rose-100 border border-rose-200 transition-all font-bold group"
                    >
                      <div className="flex items-center gap-4">
                        <img
                          src="images/admin_cartoon.jpg"
                          alt="Admin 3D"
                          className="w-16 h-16 rounded-2xl object-cover border border-rose-150 shadow-sm"
                        />
                        <div className="flex flex-col text-left">
                          <span className="text-base sm:text-lg text-rose-800 leading-tight">ทางเข้าผู้ดูแลระบบ</span>
                          <span className="text-xs sm:text-sm text-rose-600 font-light">Super Admin Dashboard</span>
                        </div>
                      </div>
                      <span className="text-rose-400 group-hover:translate-x-1.5 transition-transform text-lg">➔</span>
                    </a>
                  </div>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>
        </React.Fragment>
      );
    };


    // --- MAIN APP COMPONENT ---
    const App = () => {
      const [isPortalOpen, setIsPortalOpen] = useState(false);

      return (
        <div className="w-full min-h-screen bg-[#0C0C0C] text-[#D7E2EA] overflow-x-clip select-none relative">
          <HeroSection onPortalClick={() => setIsPortalOpen(true)} />
          <MarqueeSection />
          <AboutSection onPortalClick={() => setIsPortalOpen(true)} />
          <ServicesSection />
          <ProjectsSection />
          <FloatingPortal isOpen={isPortalOpen} setIsOpen={setIsPortalOpen} />
        </div>
      );
    };

    // Render App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
