<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tab-Lock — ส่งกระดาษคำตอบเรียบร้อยแล้ว</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Kanit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', 'Inter', sans-serif;
        }
        .bg-grid {
            background-image: linear-gradient(to right, rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .animate-bounce-slow {
            animation: bounce 2s infinite;
        }
    @keyframes bounce {
        0%, 100% {
            transform: translateY(-5%);
            animation-timing-function: cubic-bezier(0.8, 0, 1, 1);
        }
        50% {
            transform: translateY(0);
            animation-timing-function: cubic-bezier(0, 0, 0.2, 1);
        }
    }
    </style>
</head>
<body class="bg-slate-50 text-slate-700 min-h-screen flex flex-col justify-center items-center p-6 bg-grid relative overflow-hidden" style="background: linear-gradient(to right, #f8fafc 0%, #eff6ff 50%, #faf5ff 100%);">
    
    <!-- Decorative Radial Glow Backgrounds -->
    <div class="fixed w-[500px] h-[500px] bg-cyan-500/5 blur-[120px] rounded-full -top-20 -left-20 pointer-events-none"></div>
    <div class="fixed w-[550px] h-[550px] bg-pink-500/5 blur-[130px] rounded-full -bottom-20 -right-20 pointer-events-none"></div>

    <div class="w-full max-w-md bg-white/85 border border-slate-200 backdrop-blur-xl shadow-2xl p-8 rounded-3xl text-center space-y-6 z-10 relative">
        
        <!-- Animated Mascot Icon -->
        <div class="inline-flex items-center justify-center w-20 h-20 bg-white border border-slate-200 text-slate-800 rounded-full text-4xl select-none animate-bounce-slow shadow-sm" id="mascot-emoji">
            🎉
        </div>

        <div class="space-y-2">
            <h1 class="text-2xl font-extrabold tracking-tight bg-gradient-to-r from-cyan-600 to-indigo-600 bg-clip-text text-transparent">
                ส่งข้อสอบสำเร็จเรียบร้อย!
            </h1>
            <p class="text-xs text-slate-500 font-medium">ระบบได้บันทึกคำตอบของคุณเข้าสู่คลังฐานข้อมูลแล้ว</p>
        </div>

        <!-- Student Data Display Box -->
        <div class="bg-slate-100 border border-slate-205 p-4 rounded-2xl text-left text-xs text-slate-600 space-y-2 shadow-inner">
            <div class="flex justify-between">
                <span>ผู้เข้าสอบ:</span>
                <strong class="text-slate-800" id="display-name">กำลังดึงข้อมูล...</strong>
            </div>
            <div class="flex justify-between">
                <span>รหัสนักศึกษา:</span>
                <strong class="text-slate-800 font-mono" id="display-id">-</strong>
            </div>
            <div class="flex justify-between">
                <span>ห้องสอบที่เข้าสอบ:</span>
                <strong class="text-cyan-600 font-mono" id="display-room">-</strong>
            </div>
        </div>

        <!-- Dynamic Cheeky Score Teasing Container -->
        <div class="border-t border-slate-205 pt-5 space-y-4">
            
            <div id="score-section" class="hidden space-y-3">
                <div class="text-xs font-bold text-slate-500 uppercase tracking-widest">คะแนนสอบที่ได้ของคุณ</div>
                <div class="inline-block px-5 py-2.5 bg-cyan-50 border border-cyan-200 rounded-2xl text-2xl font-extrabold text-cyan-600 font-mono shadow-sm" id="score-text">
                    0 / 0 คะแนน
                </div>
                
                <!-- Score Bar Fill -->
                <div class="w-full bg-slate-100 border border-slate-205 h-2.5 rounded-full overflow-hidden shadow-inner">
                    <div id="score-bar-fill" class="bg-gradient-to-r from-cyan-500 to-indigo-500 h-full rounded-full transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>

            <!-- Funny Teasing Quote Banner -->
            <div class="p-4 bg-slate-100 border border-slate-205 rounded-2xl">
                <p id="teasing-quote" class="text-xs text-slate-600 leading-relaxed font-semibold">
                    กำลังประมวลผลคำตอบ... 🧐
                </p>
            </div>

            <!-- Leaderboard / Hall of Fame Box -->
            <div id="leaderboard-section" class="hidden p-4 bg-slate-100 border border-slate-205 rounded-2xl text-left space-y-3 shadow-inner">
                <div class="flex items-center justify-between border-b border-slate-200 pb-2">
                    <span class="text-xs font-bold text-amber-600 flex items-center gap-1">
                        🏆 Hall of Fame - บอร์ดคนเก่ง Top 5
                    </span>
                    <span class="text-[9px] text-slate-500 font-mono" id="leaderboard-room-label"></span>
                </div>
                <div class="space-y-2" id="leaderboard-list">
                    <!-- Top 5 rows will go here dynamically -->
                </div>
            </div>
        </div>

        <!-- Lobby Action Button -->
        <div class="pt-2 flex flex-col gap-3">
            <a href="Student-login.html" 
                class="block w-full text-center py-3.5 bg-gradient-to-r from-cyan-500 to-indigo-500 hover:from-cyan-600 hover:to-indigo-600 text-white rounded-2xl font-bold text-xs transition duration-300 shadow-md hover:shadow-lg active:scale-[0.98]">
                กลับสู่หน้าจอเข้าสู่ระบบหลัก
            </a>
            
            <button onclick="openReportModal()" 
                class="block w-full text-center py-3 border border-rose-500/20 bg-rose-50 hover:bg-rose-100 text-rose-600 rounded-2xl font-bold text-xs transition duration-300 shadow-sm active:scale-[0.98]">
                รายงานปัญหาข้อสอบ / พบข้อผิดพลาด (Report)
            </button>
        </div>

    </div>

    <script>
        // ฟังก์ชันลึงพารามิเตอร์ URL
        function getUrlParams() {
            const params = {};
            const search = window.location.search.substring(1);
            if (!search) return params;
            
            const pairs = search.split("&");
            for (let i = 0; i < pairs.length; i++) {
                const pair = pairs[i].split("=");
                params[decodeURIComponent(pair[0])] = decodeURIComponent(pair[1] || "");
            }
            return params;
        }

        window.addEventListener('DOMContentLoaded', () => {
            const params = getUrlParams();
            
            // ตรวจสอบว่าแอบเปิดเข้ามาโดยตรงหรือไม่
            if (!params.roomId) {
                document.getElementById('display-name').textContent = "คนแอบแฝง";
                document.getElementById('display-id').textContent = "999999";
                document.getElementById('display-room').textContent = "ลับเฉพาะ";
                document.getElementById('mascot-emoji').textContent = "🤨";
                document.getElementById('teasing-quote').textContent = "แอบลิงก์เข้ามาตรงๆ โดยไม่ได้ทำข้อสอบใช่ไหมล่ะเรา? รู้นะ! กลับไปล็อกอินสอบก่อนนะวัยรุ่น 😜";
                return;
            }

            // แสดงข้อมูลผู้สอบ
            document.getElementById('display-name').textContent = params.studentName || 'ไม่ระบุชื่อ';
            document.getElementById('display-id').textContent = params.studentId || '-';
            document.getElementById('display-room').textContent = params.roomId || '-';

            const score = parseInt(params.score) || 0;
            const maxScore = parseInt(params.maxScore) || 1;
            const showScore = parseInt(params.showScore) === 1;

            const teaseEl = document.getElementById('teasing-quote');
            const emojiEl = document.getElementById('mascot-emoji');

            if (showScore) {
                // แสดงคะแนน
                document.getElementById('score-section').classList.remove('hidden');
                document.getElementById('score-text').textContent = `${score} / ${maxScore} คะแนน`;
                
                const percent = (score / maxScore) * 100;
                setTimeout(() => {
                    document.getElementById('score-bar-fill').style.width = `${percent}%`;
                }, 300);

                // กรองคำกวนๆ ตามช่วงคะแนน
                if (percent === 100) {
                    emojiEl.textContent = "👑";
                    teaseEl.textContent = "กราบแทบตักคุณพี่ศิษย์เอก! หัวดีเกินมนุษย์ขนาดนี้ ลอกเพื่อนนั่งข้างๆ มาป่ะเนี่ย หรือจารย์เฉลยข้อสอบรั่ว? 🧐";
                } else if (percent >= 70) {
                    emojiEl.textContent = "🚀";
                    teaseEl.textContent = "เก่งไม่ธรรมดาเลยนะเราน่ะ! แอบอ่านสรุปตอนกวาดบ้านหรือพกเครื่องรางวัดดังมาสอบเหรอรอบนี้? ผ่านฉลุยจ้า! 🌟";
                } else if (percent >= 50) {
                    emojiEl.textContent = "🕯️";
                    teaseEl.textContent = "รอดตายหวุดหวิดประหนึ่งปาฏิหาริย์! คะแนนผ่านเส้นยาแดงผ่าแปด สะดุดล้มหน้าคะมำก็ตกอ่ะบอกเลย ทำบุญปล่อยปลาด่วน! 🐟";
                } else {
                    emojiEl.textContent = "💀";
                    teaseEl.textContent = "สอบตกจ้า! นี่คะแนนสอบหรือคะแนนความน่าจะเป็นของอุณหภูมิห้องห้องปรับอากาศ? ต่ำเตี้ยเรี่ยราดปวดใจจี๊ดเลยเพื่อน! 🐶💨";
                }
                
                // โหลดบอร์ดคนเก่ง Top 5 ประจำห้อง
                loadLeaderboard(params.roomId);

            } else {
                // ปิดการแสดงคะแนน
                emojiEl.textContent = "🤫";
                
                const hiddenQuotes = [
                    "ส่งกระดาษคำตอบสำเร็จ! แต่คะแนนเป็นความลับระดับสุดยอด (Top Secret) รอลุ้นเกรดเอาเองนะ ถ้าอาจารย์ไม่อ่านการ์ตูนจนลืมตรวจ! 🤫",
                    "ทำข้อสอบเสร็จแล้วก็รีบปิดคอมพ์ไปวิ่งเล่นข้างนอกซะ! คะแนนของคุณปลอดภัยในระบบดี... (มั้งนะ 🫣)",
                    "บันทึกผลสอบเข้าระบบเรียบร้อย! ส่วนคะแนนนั้น... ลอยอยู่ในหลุมดำ รออาจารย์ปล่อยคิวเฉลยรอบหน้าทีเดียวนะจ๊ะ 🌌"
                ];
                // สุ่มโควตกวนๆ
                const randomQuoteIndex = (score + maxScore) % hiddenQuotes.length;
                teaseEl.textContent = hiddenQuotes[randomQuoteIndex];
            }
        });

        async function openReportModal() {
            const params = getUrlParams();
            if (!params.roomId) {
                alert("คุณไม่มีข้อมูลห้องสอบ ไม่สามารถรายงานปัญหาได้ครับ");
                return;
            }

            const issue = prompt("⚠️ กรุณาระบุปัญหาที่พบในข้อสอบ (เช่น ตัวสะกดผิด, ช้อยส์ผิดพลาด, โจทย์สับสน):");
            if (issue === null) return; // กดยกเลิก
            
            const trimmed = issue.trim();
            if (!trimmed) {
                alert("กรุณากรอกรายละเอียดปัญหาด้วยครับ");
                return;
            }

            try {
                const response = await fetch('/api/report-issue', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        roomId: params.roomId,
                        studentId: params.studentId || 'ไม่ระบุ',
                        studentName: params.studentName || 'ไม่ระบุชื่อ',
                        class: params.class || 'ไม่ระบุ',
                        issue: trimmed
                    })
                });

                if (response.ok) {
                    alert("🚨 ส่งรายงานปัญหาไปยังอาจารย์เรียบร้อยแล้วครับ ขอบคุณที่แจ้งข้อมูล!");
                } else {
                    alert("❌ ส่งรายงานไม่สำเร็จ กรุณาลองใหม่อีกครั้ง");
                }
            } catch (err) {
                console.error(err);
                alert("❌ เกิดข้อผิดพลาดในการเชื่อมต่อหลังบ้าน");
            }
        }

        async function loadLeaderboard(roomId) {
            if (!roomId) return;
            const labelEl = document.getElementById('leaderboard-room-label');
            const sectionEl = document.getElementById('leaderboard-section');
            const listEl = document.getElementById('leaderboard-list');

            labelEl.textContent = `ห้อง: ${roomId}`;

            try {
                const res = await fetch(`/api/exam-results?roomId=${roomId}`);
                if (!res.ok) return;
                const data = await res.json();

                if (data.length === 0) {
                    sectionEl.classList.add('hidden');
                    return;
                }

                // กรองสถิติสูงสุด: จัดเรียงตามคะแนน desc จากนั้นจัดเรียงตามลำดับส่ง (id) asc
                data.sort((a, b) => {
                    if (b.score !== a.score) {
                        return b.score - a.score;
                    }
                    return a.id - b.id;
                });

                // ดึงเฉพาะ Top 5
                const top5 = data.slice(0, 5);

                const medals = ["🥇", "🥈", "🥉", "4️⃣", "5️⃣"];
                const goldStyles = ["text-amber-400 font-bold", "text-slate-300 font-semibold", "text-amber-600 font-semibold", "text-slate-400", "text-slate-400"];

                listEl.innerHTML = top5.map((student, index) => {
                    const medal = medals[index] || "⭐️";
                    const styleClass = goldStyles[index] || "text-slate-650";
                    return `
                        <div class="flex items-center justify-between p-2 rounded-xl bg-slate-950/60 border border-slate-800/80">
                            <div class="flex items-center gap-2">
                                <span class="text-sm select-none">${medal}</span>
                                <span class="text-xs ${styleClass}">${escapeHtml(student.name)} <span class="text-[9px] text-slate-400 font-normal">(${student.class || '-'})</span></span>
                            </div>
                            <span class="text-xs font-mono font-bold text-cyan-400">${student.score}/${student.maxScore} คะแนน</span>
                        </div>
                    `;
                }).join('');

                sectionEl.classList.remove('hidden');
            } catch(e) {
                console.error("โหลด Leaderboard ล้มเหลว:", e);
                sectionEl.classList.add('hidden');
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
