<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>สมัครบัญชีอาจารย์ - Tab-Lock</title>
  <meta name="description" content="สร้างบัญชีอาจารย์ใหม่สำหรับ Tab-Lock Online Exam Platform" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Kanit', 'Inter', sans-serif;
      background: #050B18;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }
    a { text-decoration: none; }

    .grid-overlay {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none; z-index: 0;
    }
    .blob {
      position: fixed; border-radius: 50%;
      filter: blur(100px); pointer-events: none; z-index: 0;
    }
    .blob-1 {
      width: 550px; height: 550px;
      background: radial-gradient(circle, rgba(99,102,241,0.18) 0%, transparent 70%);
      top: -180px; left: -180px;
      animation: radial-pulse 8s ease-in-out infinite;
    }
    .blob-2 {
      width: 450px; height: 450px;
      background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, transparent 70%);
      bottom: -130px; right: -130px;
      animation: radial-pulse 10s ease-in-out infinite reverse;
    }
    .blob-3 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(16,185,129,0.08) 0%, transparent 70%);
      top: 50%; right: 10%;
      animation: radial-pulse 12s ease-in-out infinite 3s;
    }
    @keyframes radial-pulse {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.2); opacity: 1; }
    }

    .content-layer { position: relative; z-index: 10; }

    .glass-card {
      background: rgba(15,23,42,0.75);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 28px;
      border-top: 1px solid rgba(16,185,129,0.3);
    }

    .glass-input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      border-radius: 12px;
      padding: 13px 14px 13px 44px;
      width: 100%;
      font-family: 'Kanit', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }
    .glass-input::placeholder { color: #475569; }
    .glass-input:focus {
      border-color: #10b981;
      background: rgba(16,185,129,0.07);
      box-shadow: 0 0 0 3px rgba(16,185,129,0.13);
    }
    .glass-input.error {
      border-color: #f43f5e;
      background: rgba(244,63,94,0.06);
    }

    .btn-register {
      background: linear-gradient(135deg, #059669 0%, #10b981 50%, #34d399 100%);
      box-shadow: 0 8px 32px rgba(16,185,129,0.4);
      transition: all 0.3s ease;
      border: none; cursor: pointer;
    }
    .btn-register:hover:not(:disabled) {
      box-shadow: 0 14px 44px rgba(16,185,129,0.65);
      transform: translateY(-2px);
    }
    .btn-register:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .toggle-pass {
      background: none; border: none; cursor: pointer;
      color: #64748b; padding: 0; transition: color 0.2s;
    }
    .toggle-pass:hover { color: #6ee7b7; }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: #475569; font-size: 0.8rem; transition: color 0.2s;
    }
    .back-link:hover { color: #94a3b8; }

    .link-primary { color: #34d399; transition: color 0.2s; }
    .link-primary:hover { color: #6ee7b7; }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    }

    .shield-badge {
      background: linear-gradient(135deg, rgba(16,185,129,0.2), rgba(99,102,241,0.2));
      border: 1px solid rgba(16,185,129,0.28);
      border-radius: 16px; padding: 12px;
      display: inline-flex; font-size: 1.8rem;
      animation: green-glow 3s ease-in-out infinite;
    }
    @keyframes green-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(16,185,129,0.35); }
      50% { box-shadow: 0 0 45px rgba(16,185,129,0.65); }
    }

    .input-wrapper { position: relative; }
    .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: #475569; pointer-events: none;
    }
    .input-action {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    }

    /* Step indicator */
    .step-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.1);
      transition: all 0.3s;
    }
    .step-dot.active {
      background: #10b981;
      box-shadow: 0 0 8px rgba(16,185,129,0.6);
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="grid-overlay"></div>

  <div class="content-layer min-h-screen flex flex-col items-center justify-center px-4 py-10">
    <div class="w-full max-w-lg mx-auto">

      <!-- Card -->
      <div class="glass-card p-8 md:p-10">

        <!-- Header -->
        <div class="flex flex-col items-center text-center mb-7">
          <div class="shield-badge mb-4">🛡️</div>
          <div class="text-xs font-bold tracking-[0.3em] text-emerald-400 uppercase mb-1">TAB-LOCK</div>
          <h1 class="text-2xl font-bold text-white mb-1">สร้างบัญชีอาจารย์ใหม่</h1>
          <p class="text-slate-500 text-sm">กรอกข้อมูลเพื่อสมัครใช้งาน Tab-Lock</p>

          <!-- Step dots -->
          <div class="flex gap-2 mt-3">
            <div class="step-dot active"></div>
            <div class="step-dot active"></div>
            <div class="step-dot active"></div>
          </div>
        </div>

        <!-- Message box -->
        <div id="msg-box" class="hidden mb-5"></div>

        <!-- Form -->
        <div class="space-y-4 mb-6">

          <!-- Name -->
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1.5">ชื่อ-นามสกุล</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
              </span>
              <input id="name" type="text" class="glass-input" placeholder="กรอกชื่อ-นามสกุลจริง" autocomplete="name" />
            </div>
          </div>

          <!-- Phone -->
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1.5">เบอร์โทรศัพท์</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                </svg>
              </span>
              <input id="phone" type="tel" class="glass-input" placeholder="0xx-xxx-xxxx" autocomplete="tel" />
            </div>
          </div>

          <!-- Username -->
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1.5">ชื่อผู้ใช้ (Username)</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
              </span>
              <input id="username" type="text" class="glass-input" placeholder="กรอก username ที่ต้องการ" autocomplete="username" />
            </div>
          </div>

          <!-- Two column: password fields -->
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <!-- Password -->
            <div>
              <label class="block text-sm font-medium text-slate-300 mb-1.5">รหัสผ่าน</label>
              <div class="input-wrapper">
                <span class="input-icon">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                  </svg>
                </span>
                <input id="password" type="password" class="glass-input" placeholder="รหัสผ่าน" autocomplete="new-password" style="padding-right: 40px;" />
                <span class="input-action">
                  <button class="toggle-pass" onclick="togglePassword('password','eye-icon-1')" type="button" aria-label="แสดง/ซ่อนรหัสผ่าน">
                    <svg id="eye-icon-1" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                    </svg>
                  </button>
                </span>
              </div>
            </div>

            <!-- Confirm Password -->
            <div>
              <label class="block text-sm font-medium text-slate-300 mb-1.5">ยืนยัน Password</label>
              <div class="input-wrapper">
                <span class="input-icon">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                  </svg>
                </span>
                <input id="confirm-password" type="password" class="glass-input" placeholder="ยืนยันรหัสผ่าน" autocomplete="new-password" style="padding-right: 40px;" />
                <span class="input-action">
                  <button class="toggle-pass" onclick="togglePassword('confirm-password','eye-icon-2')" type="button" aria-label="แสดง/ซ่อนรหัสผ่าน">
                    <svg id="eye-icon-2" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                    </svg>
                  </button>
                </span>
              </div>
            </div>
          </div>
        </div>

        <!-- Note -->
        <div class="p-3.5 rounded-xl mb-5 flex items-start gap-2.5"
             style="background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.18);">
          <svg class="w-4 h-4 text-emerald-400 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <span class="text-emerald-300 text-xs leading-relaxed">หลังสมัครสำเร็จ กรุณารอผู้ดูแลระบบตรวจสอบและอนุมัติบัญชีของคุณก่อนเข้าใช้งาน</span>
        </div>

        <!-- Submit -->
        <button id="register-btn" onclick="register()" class="btn-register w-full py-3.5 rounded-xl text-white font-bold text-sm flex items-center justify-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
          </svg>
          สร้างบัญชี
        </button>

        <!-- Divider -->
        <div class="divider my-6"></div>

        <!-- Back to login -->
        <div class="text-center">
          <span class="text-slate-500 text-sm">มีบัญชีอยู่แล้ว? </span>
          <a href="teacher-login.html" class="link-primary text-sm font-semibold">เข้าสู่ระบบ</a>
        </div>
        <div class="text-center mt-2">
          <a href="index.html" class="back-link justify-center">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            ย้อนกลับหน้าหลัก
          </a>
        </div>
      </div>

      <!-- Footer -->
      <p class="text-center text-slate-700 text-xs mt-6 tracking-wider">Tab-Lock Online Exam Platform</p>
    </div>
  </div>

  <script>
    function togglePassword(fieldId, iconId) {
      const input = document.getElementById(fieldId);
      const eyeIcon = document.getElementById(iconId);
      if (input.type === 'password') {
        input.type = 'text';
        eyeIcon.innerHTML = `
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
        `;
      } else {
        input.type = 'password';
        eyeIcon.innerHTML = `
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
        `;
      }
    }

    async function register() {
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      if (!name || !phone || !username || !password) { showMsg('กรุณากรอกข้อมูลให้ครบถ้วน', false); return; }
      if (password !== confirmPassword) { showMsg('รหัสผ่านไม่ตรงกัน', false); return; }
      const btn = document.getElementById('register-btn');
      btn.disabled = true;
      btn.innerHTML = `<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg> กำลังสร้างบัญชี...`;
      try {
        const res = await fetch('/api/admin/create-teacher', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, phone, username, password })
        });
        const data = await res.json();
        if (data.success) {
          showMsg('✅ สมัครสำเร็จ! กรุณารอผู้ดูแลระบบอนุมัติก่อนเข้าใช้งาน', true);
          btn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> สมัครสำเร็จแล้ว`;
        } else {
          showMsg(data.message || 'เกิดข้อผิดพลาด', false);
          btn.disabled = false;
          btn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg> สร้างบัญชี`;
        }
      } catch(e) {
        showMsg('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', false);
        btn.disabled = false;
        btn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg> สร้างบัญชี`;
      }
    }

    function showMsg(msg, isSuccess) {
      const el = document.getElementById('msg-box');
      el.textContent = msg;
      el.className = isSuccess
        ? 'p-3 rounded-xl text-xs font-bold text-emerald-400 bg-emerald-500/10 border border-emerald-500/20'
        : 'p-3 rounded-xl text-xs font-bold text-rose-400 bg-rose-500/10 border border-rose-500/20';
      el.classList.remove('hidden');
    }
  </script>
</body>
</html>
